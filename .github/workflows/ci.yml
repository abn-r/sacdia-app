name: CI

# Flutter 3.41.6 (stable, 2026-03-25) — pinned to match the Dart SDK ^3.6.1
# constraint in pubspec.yaml. Update flutter-version when bumping the SDK floor.

on:
  push:
    branches: [main, preproduction, development]
  pull_request:
    branches: [main, preproduction, development]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Analyze & Format
  # ──────────────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed --output=none .

      - name: Flutter analyze
        # --no-fatal-warnings / --no-fatal-infos: only exit non-zero on errors.
        # info/warning issues are reported but do not fail the build.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --no-pub

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Android build sanity check
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons
