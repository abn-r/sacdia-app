name: CI

# Flutter 3.41.6 (stable, 2026-03-25) — pinned to match the Dart SDK ^3.6.1
# constraint in pubspec.yaml. Update flutter-version when bumping the SDK floor.

on:
  push:
    branches: [main, preproduction, development]
  pull_request:
    branches: [main, preproduction, development]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Analyze & Format
  # ──────────────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed --output=none .

      - name: Flutter analyze
        # --no-fatal-warnings / --no-fatal-infos: only exit non-zero on errors.
        # info/warning issues are reported but do not fail the build.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --no-pub

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Build Android (APK smoke gate)
  # ──────────────────────────────────────────────────────────────────────────
  # Requires repo secret GOOGLE_SERVICES_JSON_BASE64 (base64-encoded content
  # of android/app/google-services.json). The job is skipped cleanly when the
  # secret is absent so forks and PRs without secret access still pass CI.
  #
  # One-time setup (repo admin):
  #   base64 -i android/app/google-services.json | pbcopy   # macOS
  #   # Paste into Settings > Secrets > Actions > GOOGLE_SERVICES_JSON_BASE64
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    # Secrets cannot be evaluated directly in `if:` expressions, so we map the
    # secret to an env var first and compare against empty string here.
    env:
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
    if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Build APK (release)
        run: flutter build apk --release
