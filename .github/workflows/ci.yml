name: CI

# Flutter 3.41.6 (stable, 2026-03-25) — pinned to match the Dart SDK ^3.6.1
# constraint in pubspec.yaml. Update flutter-version when bumping the SDK floor.

on:
  push:
    branches: [main, preproduction, development]
  pull_request:
    branches: [main, preproduction, development]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Analyze & Format
  # ──────────────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed --output=none .

      - name: Flutter analyze
        # --no-fatal-warnings / --no-fatal-infos: only exit non-zero on errors.
        # info/warning issues are reported but do not fail the build.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --no-pub

  # Build Android (APK) job intentionally omitted. Release APKs are produced
  # via fastlane / manual dev pipeline, not from CI. The release flavor wires
  # in google-services.json, which is gitignored as a Firebase secret. Adding
  # the build to CI requires either a GitHub Actions secret with the file
  # base64-encoded + decoded at workflow time, or a CI-only build flavor
  # without the google-services plugin. Until that is set up, analyze + test
  # are the meaningful gates on PRs.
