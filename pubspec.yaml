name: sacdia_app
description: "Aplicación Flutter con arquitectura MVVM + Clean Architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  sentry_flutter: ^9.19.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  flutter_svg: ^2.2.0
  hugeicons: ^1.1.5
  loading_animation_widget: ^1.3.0
  qr_flutter: ^4.1.0
  
  # Gestión de estado
  flutter_riverpod: ^2.6.1

  # HTTP Client
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4
  
  # Almacenamiento local
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  
  # Imágenes, archivos y permisos
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  file_picker: ^8.0.0
  permission_handler: ^11.3.0
  photo_view: ^0.15.0
  flutter_pdfview: ^1.4.0
  path_provider: ^2.1.0

  # Mapas y geocodificación
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0

  # Utilidades
  dartz: ^0.10.1
  equatable: ^2.0.7
  intl: ^0.20.1
  url_launcher: ^6.3.1
  go_router: ^15.2.0
  package_info_plus: ^8.3.0
  mime: ^2.0.0
  http_parser: ^4.0.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  firebase_app_check: ^0.3.1+4


dependency_overrides:
  # path_provider_foundation 2.6.0 re-introduced FFI-based implementation using
  # objective_c package, which builds a device-only arm64 binary. This causes
  # "Couldn't resolve native function 'DOBJC_initializeApi'" on iOS simulator
  # because the simulator needs arm64-sim ABI, not arm64 device ABI.
  # 2.5.1 reverted to the safe plugin-based implementation (no objective_c dep).
  # Remove this override once flutter/packages fixes the simulator build for 2.6.x.
  path_provider_foundation: 2.5.1

dev_dependencies:
  sentry_dart_plugin: ^3.3.0
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^6.0.0
  
  # Code generation
  build_runner: ^2.5.1
  freezed: ^3.0.6
  freezed_annotation: ^3.0.0
  json_serializable: ^6.9.5
  mockito: ^5.4.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/img/
    - assets/img/logos-clases/
    - assets/svg/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: sacdia-app
  org: sacdia-6g
